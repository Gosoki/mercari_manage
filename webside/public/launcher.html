<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mercari 订单管理 — 启动器</title>
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a2332;
        --text: #e6edf3;
        --muted: #8b9cb3;
        --accent: #3d9eff;
        --ok: #3fb950;
        --err: #f85149;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(ellipse 80% 50% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: 16px;
        padding: 28px 32px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      p.sub {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.95rem;
        margin-bottom: 20px;
        min-height: 1.4em;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }
      .dot.ok {
        background: var(--ok);
        box-shadow: 0 0 12px rgba(63, 185, 80, 0.5);
      }
      .dot.err {
        background: var(--err);
      }
      .dot.pulse {
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      a.btn {
        display: block;
        text-align: center;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.95rem;
        transition: transform 0.15s, opacity 0.15s;
      }
      a.btn.primary {
        background: linear-gradient(135deg, #238636, #2ea043);
        color: #fff;
      }
      a.btn.secondary {
        background: rgba(61, 158, 255, 0.15);
        color: var(--accent);
        border: 1px solid rgba(61, 158, 255, 0.35);
      }
      a.btn:hover {
        transform: translateY(-1px);
      }
      a.btn.inactive {
        opacity: 0.45;
        pointer-events: none;
      }
      footer {
        margin-top: 20px;
        font-size: 0.75rem;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>mercari 订单管理</h1>
      <p class="sub">检测本地后端是否就绪；就绪后可进入控制台。前端与 API 同源（默认端口见下方）。</p>
      <div class="status" id="status">
        <span class="dot pulse" id="dot"></span>
        <span id="statusText">正在检测服务…</span>
      </div>
      <div class="actions">
        <a class="btn primary inactive" id="btnApp" href="/#/dashboard">进入控制台</a>
        <a class="btn secondary" href="/docs" target="_blank" rel="noopener">API 文档</a>
      </div>
      <footer id="footerHint">同源路径：<span id="origin"></span></footer>
    </div>
    <script>
      (function () {
        var originEl = document.getElementById('origin')
        var dot = document.getElementById('dot')
        var statusText = document.getElementById('statusText')
        var btnApp = document.getElementById('btnApp')
        originEl.textContent = window.location.origin

        function setOk(msg) {
          dot.className = 'dot ok'
          statusText.textContent = msg
          btnApp.classList.remove('inactive')
        }
        function setErr(msg) {
          dot.className = 'dot err'
          statusText.textContent = msg
        }

        function ping() {
          fetch('/api/health', { credentials: 'same-origin' })
            .then(function (r) {
              if (!r.ok) throw new Error('HTTP ' + r.status)
              return r.json()
            })
            .then(function () {
              setOk('服务正常，可以进入控制台')
            })
            .catch(function () {
              setErr('无法连接后端，请确认 mercari-server 已启动')
            })
        }
        ping()
        setInterval(ping, 8000)
      })()
    </script>
  </body>
</html>
